<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Family Blackjack Multiplayer</title>
    
    <script src="/static/js/socket.io.min.js"></script>
    
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body.not-joined button {
            display: none !important;
        }
        body.not-joined #setup-panel button {
            display: inline-block !important;
        }
        body.not-joined .hand-panel {
            display: none !important;
        }
    </style>
</head>
<body class="not-joined">

    <div id="toast-notification"></div>

    <h1>♠ Family Black Jack ♣
        <button id="logout-btn" style="display:none; font-size:12px; float:right; background:#b02a37; color:white; border:none; border-radius:4px; padding:6px 12px; cursor:pointer;">Logout</button>
        <button id="reset-btn" style="display:none; font-size:12px; float:right; background:#b02a37; color:white; border:none; border-radius:4px; padding:6px 12px; cursor:pointer;">Stop Game</button>
    </h1>
    
    <div id="setup-panel">
        <input type="text" id="username" placeholder="Enter Your Name">
        <button id="join-btn">Join Table</button>
    </div>

    <div id="personal-penalty-alert" style="display:none;">
        <h3 style="margin: 0 0 5px 0;">🚨 INCOMING PENALTY ATTACK! 🚨</h3>
        <p id="penalty-alert-text" style="font-size: 15px; margin: 0;"></p>
    </div>

    <div id="table">
        <div class="table-panel">
    <div class="status-dashboard">
        <div class="status-row">
            <span style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8cb993; font-weight: bold;">Lobby Status</span>
            <span id="game-status-dot" style="width: 8px; height: 8px; background: #dc3545; border-radius: 50%; display: inline-block;"></span>
        </div>
        
        <div id="turn-badge-container" class="turn-badge">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
                <span id="turn-message">Awaiting entries...</span>
            </div>
            <div class="timer-track">
                <div id="turn-timer" class="timer-bar" style="width: 100%;"></div>
            </div>
        </div>

        <div id="battle-strike-banner" class="battle-banner">
            <span class="ammo-count" id="battle-ammo-value">+0</span>
            <div>
                <div style="text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; opacity: 0.8;">Active Strike Damage Stack</div>
                <div id="battle-type-text" style="font-size: 12px;">Defend immediately!</div>
            </div>
        </div>
    </div>
    
    <h4 style="margin: 10px 0 6px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #a3cfa9;">Active Players</h4>
    <div id="player-list-box"></div>
    
    <div class="lobby-actions" id="lobby-controls">
        <button id="start-game-btn" style="width: 100%; margin: 4px 0;">Start Game</button>
        <button id="shuffle-players-btn" style="width: 100%; margin: 4px 0; background: #6f42c1; color: white;">🔀 Shuffle Players 🔀</button>
        <button id="start-demo-btn" style="width: 100%; margin: 4px 0; background: #17a2b8; color: white;">🤖 Demo 🤖</button>
        <button id="stop-demo-btn" style="width: 100%; margin: 4px 0; background: #fd7e14; color: white; display: none;">🤖 Finish Demo 🤖</button>
    </div>
</div>

        <div class="table-panel">
            <h3 class="panel-heading">Card in Play</h3>
            <div class="discard-wrapper">
                <div id="top-card" class="card image-card">
                    <img class="card-img" src="/static/images/ace_of_spades.png" class="card-img" alt="Top Card">
                </div>
            </div>
            <p id="active-suit-indicator" style="font-weight: bold; margin-top: 5px; color: #ffeb3b; font-size: 14px;"></p>
        </div>

        <div class="table-panel hand-panel">
            <h3 class="panel-heading" style="margin: 5px 0;">Your Hand</h3>
            
            <div style="margin-bottom: 8px;">
                <button id="shuffle-hand-btn" type="button" style="background: #4a544c; color: white; padding: 6px 12px; font-size: 12px; margin: 2px;">🎲 Randomise Hand</button>
                <button id="sort-hand-btn" type="button" style="background: #2b5c8f; color: white; padding: 6px 12px; font-size: 12px; margin: 2px;">📊 Sort Hand</button>
            </div>

            <div id="my-hand"></div>
            
            <div style="margin-top: 5px;">
                <button id="play-btn" disabled>Play Card(s)</button>
                <button id="action-draw-btn">Draw Card</button>
            </div>
            
            <div id="queen-actions" style="display:none; margin-top: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px;">
                <p style="color: #ffeb3b; font-weight: bold; margin: 0 0 5px 0; font-size: 14px;">👑 Queen Cascade Dump Suit:</p>
                <button id="cascade-hearts-btn" style="padding: 6px 12px; font-size: 13px;">♥</button>
                <button id="cascade-diamonds-btn" style="padding: 6px 12px; font-size: 13px;">♦</button>
                <button id="cascade-clubs-btn" style="padding: 6px 12px; font-size: 13px;">♣</button>
                <button id="cascade-spades-btn" style="padding: 6px 12px; font-size: 13px;">♠</button>
            </div>
        </div>

        <div class="table-panel">
            <details class="league-details" open>
                <summary>🏆 League Table</summary>
                <div class="league-content">
                    <table class="league-table">
                        <thead>
                            <tr><th>Player</th><th>W</th><th>L</th></tr>
                        </thead>
                        <tbody id="league-rows">
                            <tr><td colspan="3" style="color: #aaa;">No Game tracked.</td></tr>
                        </tbody>
                    </table>
                </div>
            </details>
        </div>
    </div>

    <h4 style="text-align: left; margin: 15px 0 5px 0; font-size: 14px;">Live Game Events:</h4>
    <div id="game-log-box"></div>

    <script src="/static/js/game.js"></script>
</body>
</html>
